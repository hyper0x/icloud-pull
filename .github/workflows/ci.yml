name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    # icloud-pull uses syscall.Stat_t.Flags (UF_DATALESS) which is
    # Darwin-only. Tests must run on macOS.
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.26'
          check-latest: true
      - run: go vet ./...
      - run: go test ./... -timeout 60s

  lint:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.26'
          check-latest: true
      - uses: golangci/golangci-lint-action@v6
        with:
          version: latest
