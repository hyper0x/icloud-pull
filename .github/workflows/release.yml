name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    # icloud-pull is macOS-only (APFS/iCloud feature).
    # Cross-compilation is not needed - we only build for macOS.
    runs-on: macos-latest
    strategy:
      matrix:
        goarch: [amd64, arm64]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.26'
          check-latest: true
      - name: Build
        env:
          GOARCH: ${{ matrix.goarch }}
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          COMMIT=$(git rev-parse --short HEAD)
          BINARY=icloud-pull
          go build -ldflags "-X github.com/hyper0x/icloud-pull/internal/cli.Version=$VERSION -X github.com/hyper0x/icloud-pull/internal/cli.Commit=$COMMIT" -o $BINARY .
          ARCHIVE=icloud-pull_${VERSION}_darwin_${{ matrix.goarch }}
          tar czf ${ARCHIVE}.tar.gz $BINARY
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: build-darwin-${{ matrix.goarch }}
          path: icloud-pull_*
          if-no-files-found: error

  release:
    needs: build
    runs-on: macos-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
      - name: Collect archives
        run: find artifacts -type f -exec cp {} . \;
      - name: Upload release
        uses: softprops/action-gh-release@v2
        with:
          files: icloud-pull_*
          fail_on_unmatched_files: true
